<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TerraGuide | Radiant Weather Insights</title>
    <meta name="description" content="A radiant, modern weather experience with real-time data and stunning ombre effects.">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="radiant-bg">
        <div class="ombre-sphere sphere-1"></div>
        <div class="ombre-sphere sphere-2"></div>
    </div>
    
    <div class="app-wrapper">
        <aside class="sidebar">
            <div class="brand">
                <span class="logo">TerraGuide</span>
            </div>
            
            <div class="search-box">
                <input type="text" id="city-input" placeholder="Search a city..." autocomplete="off">
                <button id="search-btn"><i class="fas fa-search"></i></button>
            </div>

            <div id="recent-searches" class="history-section hidden">
                <h4>RECENT SEARCHES</h4>
                <div id="recent-list" class="history-list"></div>
            </div>

            <button id="get-location-btn" class="location-btn">
                <i class="fas fa-location-crosshairs"></i> Use My Location
            </button>
        </aside>

        <main class="main-content">
            <!-- Initial State -->
            <div id="initial-state" class="state-container">
                <h3>Vibrant <br><span>Atmosphere</span> <br>Real-time.</h3>
                <p>Search for any city to see the radiant weather transitions.</p>
            </div>

            <!-- Loading State -->
            <div id="loading-spinner" class="state-container hidden">
                <div class="loader"></div>
                <p style="margin-top: 2rem; letter-spacing: 2px;">SYNCING DATA</p>
            </div>

            <!-- Error State -->
            <div id="error-message" class="state-container hidden">
                <i class="fas fa-triangle-exclamation" style="font-size: 4rem; color: #f5576c;"></i>
                <h3 style="margin-top: 2rem;">Location Lost</h3>
                <p id="error-text">City not found. Please try again.</p>
            </div>

            <!-- Weather View -->
            <div id="weather-display" class="weather-view hidden">
                <div class="header-info">
                    <h2 id="city-name">--</h2>
                    <p id="date-today">--</p>
                </div>

                <div class="weather-core">
                    <div class="temp-main">
                        <span id="temperature">--</span>
                    </div>
                    <div class="condition-visual">
                        <img id="weather-icon" src="" alt="">
                        <p id="weather-condition" class="condition-text">--</p>
                    </div>
                </div>

                <div class="details-grid">
                    <div class="detail-card">
                        <span class="detail-label">HUMIDITY</span>
                        <div class="detail-value">
                            <span id="humidity">--</span>%
                        </div>
                    </div>
                    <div class="detail-card">
                        <span class="detail-label">WIND SPEED</span>
                        <div class="detail-value">
                            <span id="wind-speed">--</span> km/h
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
